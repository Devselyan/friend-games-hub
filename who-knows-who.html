<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Knows Who Better?</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .question-card {
            background: #f8f8f8;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            text-align: left;
        }

        .option-btn:hover {
            border-color: #764ba2;
            background: #f0f0ff;
        }

        .option-btn.selected {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .option-btn.correct {
            background: #28a745 !important;
            color: white !important;
            border-color: #28a745 !important;
        }

        .option-btn.wrong {
            background: #dc3545 !important;
            color: white !important;
            border-color: #dc3545 !important;
        }

        .results-section {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
        }

        .score-breakdown {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .score-item.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .score-item.wrong {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .winner-announcement {
            font-size: 1.5rem;
            color: #764ba2;
            font-weight: bold;
            margin: 20px 0;
        }

        .progress-indicator {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
        }

        .phase-indicator {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .feedback-text {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .feedback-correct {
            background: #d4edda;
            color: #155724;
        }

        .feedback-wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .answer-reveal {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px solid #007bff;
        }

        .answer-reveal strong {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Games</a>

        <h1>🤔 Who Knows Who Better?</h1>
        <p class="subtitle">Test how well you and your friend know each other!</p>

        <!-- Setup Section -->
        <div id="setupSection" class="quiz-section active">
            <div class="input-group">
                <label for="name1">Player 1 Name</label>
                <input type="text" id="name1" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label for="name2">Player 2 Name</label>
                <input type="text" id="name2" placeholder="Enter your friend's name">
            </div>

            <button class="btn" onclick="startGame()">Start Quiz</button>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="quiz-section">
            <div class="phase-indicator" id="phaseIndicator">Phase 1: Player 1 answers about themselves</div>
            <div class="progress-indicator" id="progressIndicator">Question 1 of 10</div>

            <div class="question-card">
                <div class="question-text" id="questionText"></div>
                <div class="options-container" id="optionsContainer"></div>
            </div>

            <div class="feedback-text" id="feedbackText" style="display: none;"></div>
            
            <div class="answer-reveal" id="answerReveal" style="display: none;">
                <strong id="revealText"></strong>
            </div>

            <button class="btn" onclick="submitAnswer()" id="submitBtn" style="display: none;">Submit Answer</button>
            <button class="btn" onclick="nextQuestion()" id="nextBtn" style="display: none;">Continue</button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="quiz-section results-section">
            <h2>Quiz Complete!</h2>
            <div class="winner-announcement" id="winnerAnnouncement"></div>

            <div class="score-display" id="finalScore"></div>
            <p id="resultMessage" style="color: #666; margin: 20px 0;"></p>

            <h3 style="color: #764ba2; margin: 20px 0 15px;">Question Breakdown:</h3>
            <div class="score-breakdown" id="scoreBreakdown"></div>

            <button class="btn" onclick="resetGame()" style="margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What is your favorite hobby?",
                options: ["Sports", "Reading", "Gaming", "Music", "Cooking", "Travel"]
            },
            {
                question: "What's your favorite food?",
                options: ["Pizza", "Pasta", "Sushi", "Burgers", "Tacos", "Salad"]
            },
            {
                question: "What type of movies do you prefer?",
                options: ["Action", "Comedy", "Drama", "Horror", "Sci-Fi", "Romance"]
            },
            {
                question: "What's your ideal weekend?",
                options: ["Partying", "Relaxing at home", "Outdoor adventure", "Shopping", "Watching movies", "Meeting friends"]
            },
            {
                question: "What's your favorite season?",
                options: ["Spring", "Summer", "Fall", "Winter"]
            },
            {
                question: "What's your go-to drink?",
                options: ["Coffee", "Tea", "Juice", "Water", "Soda", "Smoothie"]
            },
            {
                question: "What's your favorite color?",
                options: ["Blue", "Red", "Green", "Purple", "Black", "White"]
            },
            {
                question: "How do you spend your free time?",
                options: ["Social media", "Exercise", "Reading", "Gaming", "Watching TV", "Hanging with friends"]
            },
            {
                question: "What's your personality type?",
                options: ["Outgoing", "Reserved", "Adventurous", "Calm", "Funny", "Serious"]
            },
            {
                question: "What's your dream destination?",
                options: ["Beach", "Mountains", "Big city", "Countryside", "Foreign country", "Staycation"]
            }
        ];

        let currentQuestion = 0;
        let player1Answers = [];
        let player2Guesses = [];
        let player2Score = 0;
        let phase = 1;
        let selectedOption = null;

        function startGame() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            if (!name1 || !name2) {
                alert('Please enter both names!');
                return;
            }

            document.getElementById('setupSection').classList.remove('active');
            document.getElementById('quizSection').classList.add('active');

            player1Answers = [];
            player2Guesses = [];
            player2Score = 0;
            currentQuestion = 0;
            phase = 1;

            updatePhaseIndicator();
            loadQuestion();
        }

        function updatePhaseIndicator() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            if (phase === 1) {
                document.getElementById('phaseIndicator').textContent = `Phase 1: ${name1} answers about themselves`;
            } else {
                document.getElementById('phaseIndicator').textContent = `Phase 2: ${name2} guesses ${name1}'s answers`;
            }
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            document.getElementById('progressIndicator').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;

            if (phase === 1) {
                document.getElementById('questionText').textContent = `${name1}: ${q.question}`;
            } else {
                document.getElementById('questionText').textContent = `${name2}: What did ${name1} choose for this question?`;
            }

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });

            selectedOption = null;
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('feedbackText').style.display = 'none';
            document.getElementById('answerReveal').style.display = 'none';

            // Disable options after selection in phase 2
            if (phase === 2) {
                optionsContainer.style.pointerEvents = 'none';
            }
        }

        function selectOption(index, btn) {
            if (phase === 2) return; // Can't change answer in phase 2

            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedOption = index;
        }

        function submitAnswer() {
            if (selectedOption === null) {
                alert('Please select an answer!');
                return;
            }

            if (phase === 1) {
                // Phase 1: Player 1 answers about themselves
                player1Answers.push(selectedOption);
                
                // Show confirmation and move to next
                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('nextBtn').textContent = 'Next Question';
                
                // Clear selection for next question
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                selectedOption = null;
            } else {
                // Phase 2: Player 2 guesses, then reveal if correct
                player2Guesses.push(selectedOption);
                
                const correctAnswer = player1Answers[currentQuestion];
                const isCorrect = selectedOption === correctAnswer;
                
                if (isCorrect) {
                    player2Score++;
                }

                // Highlight correct and wrong answers
                const options = document.querySelectorAll('.option-btn');
                options[correctAnswer].classList.add('correct');
                if (!isCorrect) {
                    options[selectedOption].classList.add('wrong');
                }

                // Show feedback
                const name1 = document.getElementById('name1').value.trim();
                const name2 = document.getElementById('name2').value.trim();
                const feedbackEl = document.getElementById('feedbackText');
                
                feedbackEl.style.display = 'block';
                feedbackEl.className = 'feedback-text ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong');
                feedbackEl.textContent = isCorrect 
                    ? `✅ Correct! ${name2} knows ${name1} well!` 
                    : `❌ Wrong! ${name1} chose "${questions[currentQuestion].options[correctAnswer]}"`;

                document.getElementById('revealText').textContent = `${name1}'s answer: ${questions[currentQuestion].options[correctAnswer]}`;
                document.getElementById('answerReveal').style.display = 'block';

                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'See Results' : 'Next Question';
            }
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion >= questions.length) {
                if (phase === 1) {
                    // Move to phase 2
                    phase = 2;
                    currentQuestion = 0;
                    updatePhaseIndicator();
                    loadQuestion();
                } else {
                    // Show results
                    showResults();
                }
                return;
            }

            loadQuestion();
        }

        function showResults() {
            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('resultsSection').style.display = 'block';

            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            const percentage = Math.round((player2Score / questions.length) * 100);
            
            document.getElementById('finalScore').textContent = `${player2Score}/${questions.length} (${percentage}%)`;

            let winnerText = '';
            let resultMessage = '';
            
            if (percentage >= 80) {
                winnerText = `🎉 ${name2} knows ${name1} REALLY well!`;
                resultMessage = `Amazing! ${name2} got ${player2Score} out of ${questions.length} correct! You two must be best friends!`;
            } else if (percentage >= 60) {
                winnerText = `😊 ${name2} knows ${name1} pretty well!`;
                resultMessage = `Good job! ${name2} got ${player2Score} out of ${questions.length} correct. There's still more to learn about each other!`;
            } else if (percentage >= 40) {
                winnerText = `🤔 ${name2} is getting to know ${name1}...`;
                resultMessage = `Not bad! ${name2} got ${player2Score} out of ${questions.length} correct. Keep spending time together!`;
            } else {
                winnerText = `😅 ${name2} has a lot to learn about ${name1}!`;
                resultMessage = `Oops! ${name2} only got ${player2Score} out of ${questions.length} correct. Time for more hangouts!`;
            }

            document.getElementById('winnerAnnouncement').textContent = winnerText;
            document.getElementById('resultMessage').textContent = resultMessage;

            // Build breakdown
            let breakdownHtml = '';
            questions.forEach((q, i) => {
                const isCorrect = player2Guesses[i] === player1Answers[i];
                breakdownHtml += `
                    <div class="score-item ${isCorrect ? 'correct' : 'wrong'}">
                        <span style="flex: 2;"><strong>Q${i+1}:</strong> ${q.question}</span>
                        <span style="flex: 1; font-size: 0.85rem;">${name1}: ${q.options[player1Answers[i]]}</span>
                        <span style="flex: 1; font-size: 0.85rem;">${name2}: ${q.options[player2Guesses[i]]}</span>
                        <span>${isCorrect ? '✅' : '❌'}</span>
                    </div>
                `;
            });

            document.getElementById('scoreBreakdown').innerHTML = breakdownHtml;
        }

        function resetGame() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('setupSection').classList.add('active');
            document.getElementById('name1').value = '';
            document.getElementById('name2').value = '';
        }
    </script>
</body>
</html>
